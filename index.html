<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Free Calendars</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.11/index.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --surface2:     #22263a;
      --border:       rgba(255,255,255,.07);
      --text:         #f0f0f0;
      --muted:        #6b7280;
      --accent-text:  #818cf8;
      --radius:       14px;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg:          #f5f5f7;
        --surface:     #ffffff;
        --surface2:    #f0f0f5;
        --border:      rgba(0,0,0,.08);
        --text:        #111827;
        --muted:       #6b7280;
        --accent-text: #6366f1;
      }
    }

    :root[data-theme="light"] {
      --bg:          #f5f5f7;
      --surface:     #ffffff;
      --surface2:    #f0f0f5;
      --border:      rgba(0,0,0,.08);
      --text:        #111827;
      --muted:       #6b7280;
      --accent-text: #6366f1;
    }

    :root[data-theme="dark"] {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      rgba(255,255,255,.07);
      --text:        #f0f0f0;
      --muted:       #6b7280;
      --accent-text: #818cf8;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .logo-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .topbar-name {
      font-size: .92rem;
      font-weight: 600;
      letter-spacing: -.01em;
    }

    .topbar-sub {
      font-size: .73rem;
      color: var(--muted);
    }

    .sync-badge {
      font-size: .7rem;
      padding: .25rem .6rem;
      border-radius: 20px;
      background: rgba(99,102,241,.12);
      color: var(--accent-text);
      border: 1px solid rgba(99,102,241,.22);
      display: flex;
      align-items: center;
      gap: .35rem;
      white-space: nowrap;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    #theme-toggle {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }

    #theme-toggle:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ── Status bar ── */
    #status {
      text-align: center;
      padding: .6rem 1rem;
      font-size: .8rem;
      display: none;
    }

    #status.loading { display: block; color: var(--muted); }

    #status.error {
      display: block;
      background: rgba(239,68,68,.1);
      color: #fca5a5;
      border-bottom: 1px solid rgba(239,68,68,.2);
    }

    /* ── Main layout ── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    /* ── Toggles ── */
    .toggles-wrapper {
      margin-bottom: 1.25rem;
    }

    .toggles-bar {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .toggles {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      gap: .45rem;
      padding: .35rem .85rem;
      border-radius: 999px;
      border: 1.5px solid transparent;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      transition: background .15s, color .15s, opacity .15s;
      color: #fff;
    }

    .toggle-btn.inactive {
      background: transparent !important;
      opacity: .45;
    }

    .toggle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.7);
      flex-shrink: 0;
    }

    /* ── FullCalendar overrides ── */
    .fc {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      --fc-border-color:              var(--border);
      --fc-page-bg-color:             var(--surface);
      --fc-neutral-bg-color:          var(--surface2);
      --fc-list-event-hover-bg-color: var(--surface2);
      --fc-today-bg-color:            rgba(99,102,241,.06);
      --fc-event-border-color:        transparent;
    }

    .fc .fc-toolbar {
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: .5rem;
      flex-wrap: wrap;
    }

    .fc .fc-toolbar-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.02em;
    }

    .fc .fc-button {
      background:   var(--surface2) !important;
      border:       1px solid var(--border) !important;
      color:        var(--muted) !important;
      font-family:  'Inter', sans-serif !important;
      font-size:    .73rem !important;
      font-weight:  500 !important;
      padding:      .33rem .65rem !important;
      border-radius: 8px !important;
      transition:   all .15s !important;
      box-shadow:   none !important;
      text-transform: none !important;
    }

    .fc .fc-button:hover {
      background:   rgba(99,102,241,.15) !important;
      color:        var(--accent-text) !important;
      border-color: rgba(99,102,241,.3) !important;
    }

    .fc .fc-button-active,
    .fc .fc-button-primary:not(:disabled).fc-button-active {
      background:   #6366f1 !important;
      color:        #fff !important;
      border-color: #6366f1 !important;
    }

    .fc .fc-button:disabled { opacity: .4 !important; }

    .fc .fc-col-header-cell {
      background: var(--surface);
      border-bottom: 1px solid var(--border) !important;
      padding: .5rem 0 !important;
    }

    .fc .fc-col-header-cell-cushion {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      text-decoration: none !important;
    }

    .fc .fc-daygrid-day-number {
      font-size: .78rem;
      color: var(--muted);
      padding: .4rem .55rem;
      text-decoration: none !important;
    }

    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
      background: #6366f1;
      color: #fff;
      border-radius: 6px;
      font-weight: 600;
    }

    .fc-event {
      border-radius: 5px !important;
      border: none !important;
      font-size: .71rem !important;
      font-weight: 500 !important;
      padding: 2px 6px !important;
      cursor: pointer !important;
      transition: opacity .15s !important;
    }

    .fc-event:hover { opacity: .8 !important; }

    .fc .fc-list { border: none !important; }

    .fc .fc-list-day-cushion {
      background: var(--surface2) !important;
      padding: .5rem 1rem !important;
    }

    .fc .fc-list-day-text,
    .fc .fc-list-day-side-text {
      font-size: .78rem !important;
      font-weight: 600 !important;
      color: var(--accent-text) !important;
      text-decoration: none !important;
    }

    .fc .fc-list-event td {
      border-color: var(--border) !important;
      padding: .55rem 1rem !important;
      font-size: .83rem !important;
      color: var(--text) !important;
    }

    .fc .fc-list-event:hover td { background: var(--surface2) !important; }

    .fc .fc-list-empty {
      background: var(--surface) !important;
      color: var(--muted) !important;
      font-size: .85rem !important;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
      overflow: hidden;
      animation: slideUp .2s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      padding: 1.25rem 1.25rem 1rem;
      position: relative;
    }

    .modal-cal-label {
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.65);
      margin-bottom: .3rem;
    }

    #modal-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      padding-right: 2rem;
    }

    #modal-close {
      position: absolute;
      top: .9rem;
      right: .9rem;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      font-size: .78rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }

    #modal-close:hover { background: rgba(255,255,255,.28); }

    .modal-body { padding: 1rem 1.25rem 1.25rem; }

    .modal-row {
      display: flex;
      gap: .75rem;
      align-items: flex-start;
      padding: .55rem 0;
      border-bottom: 1px solid var(--border);
    }

    .modal-row:last-child { border-bottom: none; }

    .modal-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
    }

    .modal-info { flex: 1; }

    .modal-info-label {
      font-size: .66rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: .15rem;
    }

    .modal-info-value {
      font-size: .85rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Subscribe trigger button ── */
    #subscribe-trigger {
      height: 32px;
      padding: 0 .75rem;
      gap: .4rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }

    #subscribe-trigger:hover,
    #subscribe-trigger.open {
      background: var(--border);
      color: var(--text);
    }

    /* ── Subscribe dropdown ── */
    .subscribe-panel {
      margin-top: .6rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .subscribe-panel[hidden] { display: none; }

    .subscribe-panel-heading {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      padding: .7rem 1rem .55rem;
    }

    .subscribe-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1rem;
      border-top: 1px solid var(--border);
      gap: 1rem;
    }

    .subscribe-cal-info {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex: 1;
      min-width: 0;
    }

    .subscribe-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subscribe-name {
      font-size: .875rem;
      font-weight: 500;
      color: var(--text);
    }

    .subscribe-actions {
      display: flex;
      gap: .4rem;
      flex-shrink: 0;
    }

    .sub-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 .85rem;
      border-radius: 8px;
      font-size: .75rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: opacity .15s;
      white-space: nowrap;
      cursor: pointer;
      border: none;
    }

    .sub-btn:hover { opacity: .75; }
    .sub-btn-primary { color: #fff; }
    .sub-btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Modal subscribe ── */
    .modal-subscribe {
      margin-top: .85rem;
      padding-top: .85rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .modal-subscribe a {
      font-size: .8rem;
      color: var(--accent-text);
      text-decoration: none;
    }

    .modal-subscribe a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .main     { padding: .75rem .75rem 2rem; }
      .topbar   { padding: .75rem 1rem; }
      .sync-badge span { display: none; }
      .fc .fc-toolbar { padding: .75rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-name">First Free Calendars</div>
    </div>
    <div class="topbar-right">
      <div class="sync-badge">
        <div class="sync-dot"></div>
        <span>Live sync</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </div>

  <div id="status"></div>

  <div class="main">
    <div class="toggles-wrapper">
      <div class="toggles-bar">
        <div class="toggles" id="toggles"></div>
        <button id="subscribe-trigger" aria-label="Add to your calendar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>
          Subscribe
        </button>
      </div>
      <div class="subscribe-panel" id="subscribe-panel" hidden>
        <div class="subscribe-panel-heading">Add to your calendar</div>
        <div id="subscribe-list"></div>
      </div>
    </div>
    <div id="calendar"></div>
  </div>

  <div id="modal-overlay" role="dialog" aria-modal="true">
    <div id="modal">
      <div class="modal-header" id="modal-header">
        <div class="modal-cal-label" id="modal-cal-label"></div>
        <div id="modal-title"></div>
        <button id="modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    // ─── Config ────────────────────────────────────────────────────────────────
    const CALENDARS = [
      {
        id:        'public',
        name:      'Public Events',
        color:     '#6366f1',
        localPath: 'calendars/public.ics',
        url:       'https://outlook.office365.com/owa/calendar/5b6e6c2fedab4ca0a90fced22273b7d8@freechurchcalgary.com/59cd8b6c9d4649dfb83bb379f09cbc3314956804182017763219/calendar.ics'
      },
      {
        id:        'ministerial',
        name:      'Ministerial',
        color:     '#10b981',
        localPath: 'calendars/ministerial.ics',
        url:       'https://outlook.office365.com/owa/calendar/5b6e6c2fedab4ca0a90fced22273b7d8@freechurchcalgary.com/c9a0306ed2b846b38bf6111b9a467b3f11924704179160873012/calendar.ics'
      },
      {
        id:        'rentals',
        name:      'Rentals',
        color:     '#ef4444',
        localPath: 'calendars/rentals.ics',
        url:       'https://outlook.office365.com/owa/calendar/5b6e6c2fedab4ca0a90fced22273b7d8@freechurchcalgary.com/e7bb0be2709c4af5861301a50735b78c13308200961684392270/calendar.ics'
      }
    ];

    const EXPAND_FROM = ICAL.Time.fromJSDate(new Date(new Date().getFullYear() - 1, 0, 1));
    const EXPAND_TO   = ICAL.Time.fromJSDate(new Date(new Date().getFullYear() + 2, 11, 31));

    // ─── State ─────────────────────────────────────────────────────────────────
    const visible      = new Set(CALENDARS.map(c => c.id));
    let   calendarData = {};  // calId -> [fcEvent]
    let   fcCalendar;

    // ─── ICS Parsing ───────────────────────────────────────────────────────────
    function parseICS(text, cal) {
      const events = [];
      let comp;
      try {
        comp = new ICAL.Component(ICAL.parse(text));
      } catch (e) {
        console.error('ICS parse error for', cal.id, e);
        return events;
      }

      comp.getAllSubcomponents('vevent').forEach(vevent => {
        const ev = new ICAL.Event(vevent);
        if (!ev.startDate) return;

        const toFC = (startDate, endDate, item) => {
          const isAllDay = startDate.isDate;
          const evt = item || ev;
          return {
            id:    (ev.uid || Math.random()) + '-' + startDate.toUnixTime(),
            title: evt.summary || '(No title)',
            start: isAllDay ? startDate.toString().slice(0, 10) : startDate.toJSDate(),
            end:   endDate  ? (isAllDay ? endDate.toString().slice(0, 10) : endDate.toJSDate()) : null,
            allDay: isAllDay,
            extendedProps: {
              calId:       cal.id,
              description: evt.description || '',
              location:    evt.location    || ''
            }
          };
        };

        if (ev.isRecurring()) {
          try {
            const expand = new ICAL.RecurExpansion({ component: vevent, dtstart: ev.startDate });
            let next, count = 0;
            while ((next = expand.next()) && count++ < 1000) {
              if (next.compare(EXPAND_TO)   >  0) break;
              if (next.compare(EXPAND_FROM) <  0) continue;
              const d = ev.getOccurrenceDetails(next);
              events.push(toFC(d.startDate, d.endDate, d.item));
            }
          } catch (e) {
            // Fallback: just add the base event
            events.push(toFC(ev.startDate, ev.endDate, null));
          }
        } else {
          events.push(toFC(ev.startDate, ev.endDate, null));
        }
      });

      return events;
    }

    // ─── Fetch ─────────────────────────────────────────────────────────────────
    async function fetchCalendar(cal) {
      const res = await fetch(cal.localPath + '?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return parseICS(await res.text(), cal);
    }

    async function loadAll() {
      setStatus('Fetching calendars\u2026', 'loading');

      const results = await Promise.allSettled(CALENDARS.map(fetchCalendar));
      calendarData = {};
      const failed = [];

      results.forEach((r, i) => {
        if (r.status === 'fulfilled') {
          calendarData[CALENDARS[i].id] = r.value;
        } else {
          failed.push(CALENDARS[i].name);
          console.error('Failed to load', CALENDARS[i].name, r.reason);
        }
      });

      if (failed.length) {
        setStatus('Could not load: ' + failed.join(', '), 'error');
      } else {
        hideStatus();
      }

      refreshEvents();
    }

    function refreshEvents() {
      if (!fcCalendar) return;
      fcCalendar.getEventSources().forEach(s => s.remove());
      CALENDARS.forEach(cal => {
        if (visible.has(cal.id) && calendarData[cal.id]) {
          fcCalendar.addEventSource({
            id:        cal.id,
            color:     cal.color,
            textColor: '#fff',
            events:    calendarData[cal.id]
          });
        }
      });
    }

    // ─── Status helpers ────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status');
    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className   = type;
      statusEl.style.display = '';
    }
    function hideStatus() {
      statusEl.style.display = 'none';
      statusEl.className = '';
    }

    // ─── Modal ─────────────────────────────────────────────────────────────────
    const ICON_CLOCK    = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
    const ICON_LOCATION = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    const ICON_NOTE     = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';

    function formatDateRange(start, end, allDay) {
      const dateOpts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
      const timeOpts = { hour: 'numeric', minute: '2-digit' };
      if (allDay) return start.toLocaleDateString('en-CA', dateOpts);
      const date = start.toLocaleDateString('en-CA', dateOpts);
      const t1   = start.toLocaleTimeString('en-CA', timeOpts);
      const t2   = end ? end.toLocaleTimeString('en-CA', timeOpts) : null;
      return t2 ? date + '  \u00b7  ' + t1 + ' \u2013 ' + t2
                : date + '  \u00b7  ' + t1;
    }

    function openModal(info) {
      const { title, start, end, allDay, extendedProps } = info.event;
      const cal = CALENDARS.find(c => c.id === extendedProps.calId);

      document.getElementById('modal-header').style.background = cal.color;
      document.getElementById('modal-cal-label').textContent   = cal.name;
      document.getElementById('modal-title').textContent       = title;

      const body = document.getElementById('modal-body');
      body.innerHTML = '';

      const rows = [
        { icon: ICON_CLOCK,    label: 'When',        value: formatDateRange(start, end, allDay) },
        extendedProps.location    ? { icon: ICON_LOCATION, label: 'Location',    value: extendedProps.location    } : null,
        extendedProps.description ? { icon: ICON_NOTE,     label: 'Description', value: extendedProps.description } : null
      ].filter(Boolean);

      rows.forEach(r => {
        const row = document.createElement('div');
        row.className = 'modal-row';
        row.innerHTML =
          '<div class="modal-icon">' + r.icon + '</div>' +
          '<div class="modal-info">' +
            '<div class="modal-info-label">' + r.label + '</div>' +
            '<div class="modal-info-value">' + r.value + '</div>' +
          '</div>';
        body.appendChild(row);
      });

      const sub = document.createElement('div');
      sub.className = 'modal-subscribe';
      sub.innerHTML = '<a href="' + cal.url.replace('https://', 'webcal://') + '">Subscribe to ' + cal.name + '</a>';
      body.appendChild(sub);

      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    // ─── Subscribe section ─────────────────────────────────────────────────────
    const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);

    function buildSubscribeSection() {
      const list = document.getElementById('subscribe-list');
      CALENDARS.forEach(cal => {
        const webcal = cal.url.replace('https://', 'webcal://');
        const row = document.createElement('div');
        row.className = 'subscribe-row';
        row.innerHTML =
          '<div class="subscribe-cal-info">' +
            '<span class="subscribe-dot" style="background:' + cal.color + '"></span>' +
            '<span class="subscribe-name">' + cal.name + '</span>' +
          '</div>' +
          '<div class="subscribe-actions">' +
            (isApple ? '<a href="' + webcal + '" class="sub-btn sub-btn-primary" style="background:' + cal.color + '">Subscribe</a>' : '') +
            '<button class="sub-btn ' + (isApple ? 'sub-btn-secondary' : 'sub-btn-primary') + '" ' + (!isApple ? 'style="background:' + cal.color + '"' : '') + ' onclick="navigator.clipboard.writeText(\'' + cal.url + '\').then(() => { this.textContent=\'Copied!\'; setTimeout(() => this.textContent=\'Copy link\', 2000); })">Copy link</button>' +
          '</div>';
        list.appendChild(row);
      });
    }

    // ─── Toggles ───────────────────────────────────────────────────────────────
    function buildToggles() {
      const container = document.getElementById('toggles');
      CALENDARS.forEach(cal => {
        const btn = document.createElement('button');
        btn.className           = 'toggle-btn active';
        btn.dataset.calId       = cal.id;
        btn.style.borderColor   = cal.color;
        btn.style.background    = cal.color;
        btn.innerHTML =
          '<span class="toggle-dot"></span>' + cal.name;

        btn.addEventListener('click', () => {
          if (visible.has(cal.id)) {
            visible.delete(cal.id);
            btn.classList.add('inactive');
            btn.style.background = 'transparent';
            btn.style.color      = cal.color;
          } else {
            visible.add(cal.id);
            btn.classList.remove('inactive');
            btn.style.background = cal.color;
            btn.style.color      = '#fff';
          }
          refreshEvents();
        });

        container.appendChild(btn);
      });
    }

    // ─── Theme ─────────────────────────────────────────────────────────────────
    const ICON_SUN  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    const ICON_MOON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

    function getEffectiveTheme() {
      const stored = document.documentElement.getAttribute('data-theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = theme === 'dark' ? ICON_SUN : ICON_MOON;
    }

    // Restore saved preference immediately (before DOMContentLoaded) to avoid flash
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();

    // ─── Init ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      // Set initial theme button icon
      applyTheme(getEffectiveTheme());
      document.getElementById('theme-toggle').addEventListener('click', () => {
        applyTheme(getEffectiveTheme() === 'dark' ? 'light' : 'dark');
      });

      buildToggles();
      buildSubscribeSection();

      const subTrigger = document.getElementById('subscribe-trigger');
      const subPanel   = document.getElementById('subscribe-panel');
      subTrigger.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = !subPanel.hidden;
        subPanel.hidden = isOpen;
        subTrigger.classList.toggle('open', !isOpen);
      });
      document.addEventListener('click', () => {
        subPanel.hidden = true;
        subTrigger.classList.remove('open');
      });
      subPanel.addEventListener('click', e => e.stopPropagation());

      fcCalendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left:   'prev,next today',
          center: 'title',
          right:  'dayGridMonth,listMonth'
        },
        buttonText:       { today: 'Today', month: 'Month', list: 'List' },
        height:           'auto',
        firstDay:         0,
        initialView:      window.innerWidth < 640 ? 'listMonth' : 'dayGridMonth',
        displayEventTime: false,
        eventClick:       openModal,
        noEventsContent:  'No events to display'
      });

      fcCalendar.render();
      loadAll();

      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
      });
    });
  </script>

</body>
</html>
